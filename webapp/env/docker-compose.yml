version: '3.8'

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: kavach-dvwa
    ports:
      - "8080:80"
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop
    container_name: kavach-juice-shop
    ports:
      - "3000:3000"
    restart: unless-stopped

networks:
  default:
    name: kavach-vuln-network
