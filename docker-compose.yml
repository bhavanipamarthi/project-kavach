version: '3.9'

services:
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: kavach-dvwa
    ports:
      - "8085:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kavach-net

  juice-shop:
    image: bkimminich/juice-shop:v15.0.0
    container_name: kavach-juice-shop
    ports:
      - "4280:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kavach-net

networks:
  kavach-net:
    driver: bridge
    name: kavach-network
